spring.application.name=product-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/product_db}
spring.datasource.username=${DB_USERNAME:product_user}
spring.datasource.password=${DB_PASSWORD:product_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui.html
